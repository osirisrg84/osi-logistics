<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest-dispatch.webmanifest" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OSI Logistics" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSI Logistics — Dispatch Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #pre-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:99999;transition:opacity .25s}
    #pre-loader.done{opacity:0;pointer-events:none}
    .pre-spin{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:pspin .7s linear infinite}
    @keyframes pspin{to{transform:rotate(360deg)}}
  </style>
  </head>
  <body>
    <div id="pre-loader"><div class="pre-spin"></div></div>
    <div id="root"></div>
    <script>
      new MutationObserver(function(_, obs){
        var r=document.getElementById('root');
        if(r && r.firstChild){
          var l=document.getElementById('pre-loader');
          if(l){l.classList.add('done');setTimeout(function(){l.remove()},300);}
          obs.disconnect();
        }
      }).observe(document.getElementById('root'),{childList:true});
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
